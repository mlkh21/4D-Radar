# ==============================================================================
# 4D Radar Diffusion & Consistency Models - Configuration File
# ==============================================================================

# --- Data Configuration ---
data:
  dataset_dir: "./Data/NTU4DRadLM_Pre"
  batch_size: 2
  num_workers: 4
  train_split: 0.8
  # TODO: 新增跨场景评估切分配置，固定garden/loop3实验协议以便复现。
  alignment_size: 32
  use_augmentation: true
  augmentation:
    # Keep viewpoint geometry fixed for forward-looking radar densification.
    enable_flip: false
    enable_rotate: false
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_prob: 0.2
    noise_std: 0.02
    dropout_prob: 0.1
    point_dropout_rate: 0.05

# --- VAE Configuration ---
vae:
  # Config type: ultra_lightweight / lightweight / standard
  config_type: "ultra_lightweight"
  in_channels: 4
  out_channels: 4
  latent_dim: 4
  kl_weight: 1.0e-6
  # Sparse occupancy needs stronger positive-voxel supervision than plain MSE.
  occupied_weight: 8.0
  empty_weight: 1.0
  channel_weights: [4.0, 0.2, 0.5, 0.2]
  # Training parameters
  epochs: 100
  lr: 1.0e-4
  save_every: 10
  save_dir: "./Result/train_results/vae"
  
# --- Latent Diffusion Model Configuration ---
ldm:
  # Model architecture
  model_channels: 32
  channel_mult: [1, 2, 3]
  num_res_blocks: 1
  attention_resolutions: []  # Disable attention to save memory
  # Diffusion parameters (Karras)
  sigma_data: 0.5
  sigma_max: 80.0
  sigma_min: 0.002
  rho: 7.0
  decoded_loss_weight: 0.05
  # Training parameters
  epochs: 200  # Number of training epochs
  lr: 1.0e-4
  save_every: 10  # Save checkpoint every N epochs
  save_dir: "./Result/train_results/ldm"

# --- Consistency Distillation Configuration ---
cd:
  # Distillation from LDM to CD model
  teacher_model_path: ""  # LDM checkpoint path
  # Distillation parameters
  training_mode: "consistency_distillation"
  target_ema_mode: "fixed"
  start_ema: 0.95
  scale_mode: "fixed"
  start_scales: 40
  end_scales: 40
  epochs: 200  # Number of training epochs (100 epochs * 2007 batches ≈ 200k steps)
  distill_steps_per_iter: 50000
  loss_norm: "l2"  # l1 / l2 / lpips
  # Training parameters
  lr: 5.0e-5
  save_every: 10  # Save checkpoint every N epochs
  save_dir: "./Result/train_results/cd"

# --- Optimization Configuration ---
optimization:
  use_amp: false  # Mixed precision training (disabled due to type mismatch in VAE)
  gradient_accumulation_steps: 8
  use_checkpoint: true  # Gradient checkpointing
  use_fp16: false  # FP16 model weights
  max_grad_norm: 1.0

# --- Hardware Configuration ---
hardware:
  device: "cuda"
  num_gpus: 2

# --- Logging Configuration ---
logging:
  log_interval: 100
  save_samples: true
  sample_interval: 1000
  tensorboard: true
  wandb: false

# --- Inference Configuration ---
inference:
  # Per-scene file cap for batch inference scripts (0 means all files)
  max_infer_files: 100
  # If thresholded occupancy is empty, keep top-k occupancy voxels as fallback (0 disables)
  empty_fallback_topk: 0
  # TODO: 新增速度分档参数(35/50/70mps)用于动态窗口与衰减策略配置。
  # TODO: 新增在线融合参数（IR质量门控、DEM先验置信图、风险判定反应时）。
